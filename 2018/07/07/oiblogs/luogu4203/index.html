d">return</span> re;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">query</span><span class="params">(<span class="keyword">int</span> o, <span class="keyword">int</span> xu, <span class="keyword">int</span> yu, <span class="keyword">int</span> xv, <span class="keyword">int</span> yv)</span></span>&#123;</span><br><span class="line">	<span class="keyword">return</span> sum(o, xv, yv)-sum(o, xu<span class="number">-1</span>, yv)-sum(o, xv, yu<span class="number">-1</span>)+sum(o, xu<span class="number">-1</span>, yu<span class="number">-1</span>);</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">add</span><span class="params">(<span class="keyword">int</span> o, <span class="keyword">int</span> a, <span class="keyword">int</span> b, <span class="keyword">int</span> v)</span></span>&#123;</span><br><span class="line">	a++; b++;</span><br><span class="line">	<span class="keyword">for</span>(; a&lt;=len2; a+=lb(a))</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=b; i&lt;=len4; i+=lb(i))</span><br><span class="line">			cc[o][a][i] += v;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">	<span class="built_in">cin</span>&gt;&gt;n&gt;&gt;len;</span><br><span class="line">	len2 = len &lt;&lt; <span class="number">1</span>;</span><br><span class="line">	len4 = len &lt;&lt; <span class="number">2</span>;</span><br><span class="line">	<span class="keyword">while</span>(n--)&#123;</span><br><span class="line">		<span class="built_in">scanf</span>(<span class="string">"%d %d"</span>, &amp;opt, &amp;t);</span><br><span class="line">		<span class="keyword">if</span>(opt==<spa
