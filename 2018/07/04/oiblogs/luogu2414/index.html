ta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;cstring&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;cstdio&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;queue&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"><span class="keyword">int</span> n, uu, vv, preq[<span class="number">100005</span>], fstq[<span class="number">100005</span>], sonq[<span class="number">100005</span>], pos[<span class="number">100005</span>], id, m, ans[<span class="number">100005</span>];</span><br><span class="line"><span class="keyword">char</span> ss[<span class="number">100005</span>];</span><br><span class="line"><span class="built_in">queue</span>&lt;<span class="keyword">int</span>&gt; d;</span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">AC</span>&#123;</span></span><br><span class="line">	<span class="keyword">int</span> tot, ch[<span class="number">100005</span>][<span class="number">26</span>], fa[<span class="number">100005</span>], fai[<span class="number">100005</span>], hea[<span class="number">100005</span>], cnt, dfn[<span class="number">100005</span>], nfd[<span class="number">100005</span>];</span><br><span class="line">	<span class="keyword">int</span> idx, c[<span class="number">100005</span>];</span><br><span class="line">	<span class="class"><span class="keyword">struct</span> <span class="title">Edge</span>&#123;</span></span><br><span class="line">		<span class="keyword">int</span> too, nxt;</span><br><span class="line">	&#125;edge[<span class="number">200005</span>];</span><br><span class="line">	<span class="function"><span class="keyword">int</span> <span class="title">lb</span><span class="params">(<span class="keyword">int</span> x)</span></span>&#123;</span><br><span class="line">		<span class="keyword">return</span> x &amp; -x;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">void</span> <span class="title">add</span><span class="params">(<span class="keyword">int</span> x, <span class="keyword">int</span> v)</span></span>&#123;</span><br><span class="line">		<span class="keyword">for</span>(; x&lt;=idx; x+=lb(x))</span><br><span class="line">			c[x] += v;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">int</span> <span class="title">query</span><span class="params">(<span class="keyword">int</span> x)</span></span>&#123;</span><br><span class="line">		<span class="keyword">int</span> re=<span class="number">0</span>;</span><br><span class="line">		<span class="keyword">for</span>(; x; x-=lb(x))</span><br><span class="line">			re += c[x];</span><br><span class="line">		<span class="keyword">return</span> re;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">void</span> <span class="title">add_edge</span><span class="params">(<span class="keyword">int</span> fro, <span class="keyword">int</span> too)</span></span>&#123;</span><br><span class="line">		edge[++cnt].nxt = hea[fro];</span><br><span class="line">		edge[cnt].too = too;</span><br><span class="line">		hea[fro] = cnt;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">void</span> <span class="title">build</span><span class="params">()</span></span>&#123;</span><br><span class="line">		<span class="keyword">int</span> u=<span class="number">0</span>;</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>; i&lt;=n; i++)&#123;</span><br><span class="line">			<span class="keyword">if</span>(ss[i]==<span class="string">'B'</span>)</span><br><span class="line">				u = fa[u];</span><br><span class="line">			<span class="keyword">else</span> <span class="keyword">if</span>(ss[i]==<span class="string">'P'</span>)</span><br><span class="line">				pos[++id] = u;</span><br><span class="line">			<span class="keyword">else</span>&#123;</span><br><span class="line">				<span class="keyword">int</span> c=ss[i]-<span class="string">'a'</span>;</span><br><span class="line">				<span class="keyword">if</span>(!ch[u][c])&#123;</span><br><span class="line">					ch[u][c] = ++tot;</span><br><span class="line">					fa[ch[u][c]] = u;</span><br><span class="line">				&#125;</span><br><span class="line">				u = ch[u][c];</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">void</span> <span class="title">getFail</span><span class="params">()</span></span>&#123;</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>; i&lt;<span class="number">26</span>; i++)</span><br><span class="line">			<span class="keyword">if</span>(ch[<span class="number">0</span>][i])</span><br><span class="line">				d.push(ch[<span class="number">0</span>][i]);</span><br><span class="line">		<span class="keyword">while</span>(!d.empty())&#123;</span><br><span class="line">			<span class="keyword">int</span> x=d.front();</span><br><span class="line">			d.pop();</span><br><span class="line">			<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>; i&lt;<span class="number">26</span>; i++)&#123;</span><br><span class="line">				<span class="keyword">if</span>(ch[x][i])&#123;</span><br><span class="line">					fai[ch[x][i]] = ch[fai[x]][i];</span><br><span class="line">					d.push(ch[x][i]);</span><br><span class="line">				&#125;</span><br><span class="line">				<span class="keyword">else</span>	ch[x][i] = ch[fai[x]][i];</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">void</span> <span class="title">buildTree</span><span class="params">()</span></span>&#123;</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>; i&lt;=tot; i++)</span><br><span class="line">			add_edge(fai[i], i);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">void</span> <span class="title">dfs</span><span class="params">(<span class="keyword">int</span> x)</span></span>&#123;</span><br><span class="line">		dfn[x] = ++idx;</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=hea[x]; i; i=edge[i].nxt)</span><br><span class="line">			dfs(edge[i].too);</span><br><span class="line">		nfd[x] = idx;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="keyword">void</span> <span class="title">work</span><span class="params">()</span></span>&#123;</span><br><span class="line">		<span class="keyword">int</span> u=<span class="number">0</span>;</span><br><span class="line">		id = <span class="number">0</span>;</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>; i&lt;=n; i++)&#123;</span><br><span class="line">			<span class="keyword">if</span>(ss[i]==<span class="string">'B'</span>)&#123;</span><br><span class="line">				add(dfn[u], <span class="number">-1</span>);</span><br><span class="line">				u = fa[u];</span><br><span class="line">			&#125;</span><br><span class="line">			<span class="keyword">else</span> <span class="keyword">if</span>(ss[i]==<span class="string">'P'</span>)&#123;</span><br><span class="line">				id++;</span><br><span class="line">				<span class="keyword">for</span>(<span class="keyword">int</span> y=fstq[id]; y; y=preq[y])&#123;</span><br><span class="line">					<span class="keyword">int</span> t=pos[sonq[y]];</span><br><span class="line">					ans[y] = query(nfd[t]) - query(dfn[t]<span class="number">-1</span>);</span><br><span class="line">				&#125;</span><br><span class="line">			&#125;</span><br><span class="line">			<span class="keyword">else</span>&#123;</span><br><span class="line">				u = ch[u][ss[i]-<span class="string">'a'</span>];</span><br><span class="line">				add(dfn[u], <span class="number">1</span>);</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;ac;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">	<span class="built_in">scanf</span>(<span class="string">"%s"</span>, ss+<span class="number">1</span>);</span><br><span class="line">	n = <span class="built_in">strlen</span>(ss+<span class="number">1</span>);</span><br><span class="line">	<span class="built_in">cin</span>&gt;&gt;m;</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>; i&lt;=m; i++)&#123;</span><br><span class="line">		<span class="built_in">scanf</span>(<span class="string">"%d %d"</span>, &amp;uu, &amp;vv);</span><br><span class="line">		preq[i] = fstq[vv];</span><br><span class="line">		fstq[vv] = i;</span><br><span class="line">		sonq[i] = uu;</span><br><span class="line">	&#125;</span><br><span class="line">	ac.build();</span><br><span class="line">	ac.getFail();</span><br><span class="line">	ac.buildTree();</span><br><span class="line">	ac.dfs(<span class="number">0</span>);</span><br><span class="line">	ac.work();</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>; i&lt;=m; i++)</span><br><span class="line">		<span class="built_in">printf</span>(<span class="string">"%d\n"</span>, ans[i]);</span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<script>
    function viewer_init() {
        let pswpElement = document.querySelectorAll('.pswp')[0];
        let $imgArr = document.querySelectorAll(('.article-entry img:not(.reward-img)'))

        $imgArr.forEach(($em, i) => {
            $em.onclick = () => {
                // slider展开状态
                // todo: 这样不好，后面改成状态
                if (document.querySelector('.left-col.show')) return
                let items = []
                $imgArr.forEach(($em2, i2) => {
                    let img = $em2.getAttribute('data-idx', i2)
                    let src = $em2.getAttribute('data-target') || $em2.getAttribute('src')
                    let title = $em2.getAttribute('alt')
                    // 获得原图尺寸
                    const image = new Image()
                    image.src = src
                    items.push({
                        src: src,
                        w: image.width || $em2.width,
                        h: image.height || $em2.height,
                        title: title
                    })
                })
                var gallery = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, {
                    index: parseInt(i)
                });
                gallery.init()
            }
        })
    }
    viewer_init()
</script>
