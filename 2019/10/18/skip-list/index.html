n class="line">            <span class="built_in">printf</span>(<span class="string">"这个数不存在！\n"</span>);</span><br><span class="line">            <span class="keyword">return</span> ;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">int</span> steps=<span class="number">0</span>;</span><br><span class="line">        Node *node=header;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i=level<span class="number">-1</span>; i&gt;=<span class="number">0</span>; i--) &#123;</span><br><span class="line">            <span class="keyword">while</span>(node-&gt;level[i].forward &amp;&amp; key&gt;node-&gt;level[i].forward-&gt;key) &#123;</span><br><span class="line">                steps += node-&gt;level[i].width;</span><br><span class="line">                node = node-&gt;level[i].forward;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">"%d是第%d大。\n"</span>, key, steps+<span class="number">1</span>);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="function"><span class="keyword">void</span> <span class="title">whichAfter</span><span class="params">(<span class="keyword">int</span> key)</span> </span>&#123;</span><br><span class="line">        Node *re=findNode(key);</span><br><span class="line">        <span class="keyword">if</span>(re==<span class="literal">NULL</span>)    <span class="built_in">printf</span>(<span class="string">"您给的数字不存在！\n"</span>);</span><br><span class="line">        <span class="keyword">else</span> <span class="keyword">if</span>(re-&gt;level[<span class="number">0</span>].forward==<span class="literal">NULL</span>) <span class="built_in">printf</span>(<span class="string">"%d的后继不存在！\n"</span>, key);</span><br><span class="line">        <span class="keyword">else</spa nt</span> l, <span class="keyword">int</span> r)</span> </span>&#123;</span><br><span class="line">        Node *node=header;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i=level<span class="number">-1</span>; i&gt;=<span class="number">0</span>; i--) &#123;</span><br><span class="line">            <span class="keyword">while</span>(node-&gt;level[i].forward &amp;&amp; l&gt;node-&gt;level[i].forward-&gt;key) &#123;</span><br><span class="line">                node = node-&gt;level[i].forward;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        node = node-&gt;level[<span class="number">0</span>].forward;</span><br><span class="line">        <span class="keyword">while</span>(node!=<span class="literal">NULL</span> &amp;&amp; node-&gt;key&gt;=l &amp;&amp; node-&gt;key&lt;=r) &#123;</span><br><span class="line">            Node *nxt=node-&gt;level[<span class="number">0</span>].forward;</span><br><span class="line">            dele(node-&gt;key);</span><br><span class="line">            node = nxt;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;skipList;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"欢迎来到跳表测试！请按规定输入指令，否则会造成不可预料的错误！\n请输入数字代号并按下回车进行操作。\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"1：插入一个数\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"2：删除一个数\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"3：查看第k大的数字\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"4：查看一个数是第几大\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"5：询问一个数的后继\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"6：输出一个区间里存在的数字\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"7：删除一个区间里存在的数字\n"</span>);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"8：结束\n"</span>);</span><br><span class="line">    <span class="keyword">while</span>(<span class="literal">true</span>) &#123;</span><br><span class="line">        <span class="keyword">int</span> opr, usr, rsu;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">"请输入数字代号："</span>);</span><br><span class="line">        <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;opr;</span><br><span class="line">        <span class="keyword">switch</span>(opr) &#123;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">1</span>:</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"请输入你想要插入的数k：\n"</span>);</span><br><span class="line">                <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;usr;</span><br><span class="line">                skipList.insert(usr);</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">2</span>:</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"请输入你想要删除的数k：\n"</span>);</span><br><span class="line">                <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;usr;</span><br><span class="line">                skipList.dele(usr);</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">3</span>:</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"你想要查看第几大的数字？请输入：\n"</span>);</span><br><span class="line">                <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;usr;</span><br><span class="line">                <span class="keyword">if</span>(usr&gt;skipList.length) <span class="built_in">printf</span>(<span class="string">"当前没有这么多数字，本次操作无效。\n"</span>);</span><br><span class="line">                <span class="keyword">else</span>    <span class="built_in">printf</span>(<span class="string">"第%d大的数字是%d。\n"</span>, usr, skipList.findkth(usr));</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">4</span>:</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"你想查看谁是第几大？请输入：\n"</span>);</span><br><span class="line">                <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;usr;</span><br><span class="line">                skipList.whichRank(usr);</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">5</span>:</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"你想查看谁的后继？请输入：\n"</span>);</span><br><span class="line">                <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;usr;</span><br><span class="line">                skipList.whichAfter(usr);</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">6</span>:</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"请输入区间左右端点（中间用空格分开）：\n"</span>);</span><br><span class="line">                <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;usr&gt;&gt;rsu;</span><br><span class="line">                skipList.query(usr, rsu);</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">7</span>:</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"请输入区间左右端点（中间用空格分开）：\n"</span>);</span><br><span class="line">                <span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;usr&gt;&gt;rsu;</span><br><span class="line">                skipList.rangeDele(usr, rsu);</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="number">8</span>: <span class="keyword">return</span> <span class="number">0</span>; <span class="keyword">break</span>;</span><br><span class="line">            <span class="keyword">default</span>: <span class="keyword">break</span>;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<script>
    function viewer_init() {
        let pswpElement = document.querySelectorAll('.pswp')[0];
        let $imgArr = document.querySelectorAll(('.article-entry img:not(.reward-img)'))

        $imgArr.forEach(($em, i) => {
            $em.onclick = () => {
                // slider展开状态
                // todo: 这样不好，后面改成状态
                if (document.querySelector('.left-col.show')) return
                let items = []
                $imgArr.forEach(($em2, i2) => {
                    let img = $em2.getAttribute('data-idx', i2)
                    let src = $em2.getAttribute('data-target') || $em2.getAttribute('src')
                    let title = $em2.getAttribute('alt')
                    // 获得原图尺寸
                    const image = new Image()
                    image.src = src
                    items.push({
                        src: src,
                        w: image.width || $em2.width,
                        h: image.height || $em2.height,
                        title: title
                    })
                })
                var gallery = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, {
                    index: parseInt(i)
                });
                gallery.init()
            }
        })
    }
    viewer_init()
</script>
